name: Docker Publish

on:
  push:
    tags: ["v*"]

env:
  DOCKERHUB_IMAGE: bh2smith/word-circles-backend
  GHCR_IMAGE: ghcr.io/${{ github.repository }}-backend

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build the DAppNode package (.xz) in CI and attach it to the GitHub Release,
  # so a release is a downloadable artifact instead of a local build. The .xz is
  # built from the committed deployment/ as-is — its api/Dockerfile is
  # `FROM bh2smith/word-circles-backend:<version>`, so this runs after `docker`
  # publishes that image. IPFS upload + DAppNode install stay manual (the .xz is
  # sideloaded through the DAppNode admin UI).
  dappnode-package:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the .xz to the Release
    defaults:
      run:
        working-directory: deployment
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # The git tag (e.g. v0.6.2) must match deployment/dappnode_package.json's
      # version, since the .xz and its api/Dockerfile FROM are pinned to it.
      - name: Check tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./dappnode_package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $tag != dappnode_package.json version $pkg. Bump the package version before tagging."
            exit 1
          fi
          name="$(node -p "require('./dappnode_package.json').name")"
          echo "xz=deployment/build_${name}_${pkg}/${name}_${pkg}_linux-amd64.txz" >> "$GITHUB_ENV"

      # --skip_upload builds and saves the .txz locally and skips the IPFS
      # "Verify connection" task that otherwise fails in CI (no dappnode/IPFS
      # node reachable). IPFS upload + sideload stay manual after download.
      - name: Build DAppNode package
        run: npx @dappnode/dappnodesdk build --skip_upload

      - name: Verify .xz exists
        id: artifact
        run: |
          if [ ! -f "${GITHUB_WORKSPACE}/${xz}" ]; then
            echo "::error::expected artifact not found: ${xz}"
            find . -name '*_linux-amd64.txz'
            exit 1
          fi
          echo "path=${xz}" >> "$GITHUB_OUTPUT"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dappnode-package-${{ github.ref_name }}
          path: ${{ steps.artifact.outputs.path }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
