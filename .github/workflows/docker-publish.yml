name: Docker Publish

on:
  push:
    tags: ["v*"]

env:
  DOCKERHUB_IMAGE: bh2smith/word-circles-backend
  GHCR_IMAGE: ghcr.io/${{ github.repository }}-backend

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build the DAppNode package in CI and attach the FULL release directory to the
  # GitHub Release (manifest + compose + avatar + image .txz), so a release is a
  # downloadable, installable bundle instead of a local build. The package is
  # built from the committed deployment/ as-is — its api/Dockerfile is
  # `FROM bh2smith/word-circles-backend:<version>`, so this runs after `docker`
  # publishes that image.
  #
  # Attaching all four files (not just the .txz) is what lets a maintainer pin
  # the release to IPFS straight from GitHub with:
  #   dappnodesdk from_github bh2smith/word-circles -v v<version>
  # IPFS pin + DAppNode install stay manual (needs VPN to the dappnode).
  dappnode-package:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the release files to the Release
    defaults:
      run:
        working-directory: deployment
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # The git tag (e.g. v0.6.2) must match deployment/dappnode_package.json's
      # version, since the .xz and its api/Dockerfile FROM are pinned to it.
      - name: Check tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./dappnode_package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $tag != dappnode_package.json version $pkg. Bump the package version before tagging."
            exit 1
          fi
          name="$(node -p "require('./dappnode_package.json').name")"
          dir="deployment/build_${name}_${pkg}"
          echo "dir=${dir}" >> "$GITHUB_ENV"
          echo "xz=${dir}/${name}_${pkg}_linux-amd64.txz" >> "$GITHUB_ENV"

      # --skip_upload builds and saves the .txz locally and skips the IPFS
      # "Verify connection" task that otherwise fails in CI (no dappnode/IPFS
      # node reachable). IPFS upload + sideload stay manual after download.
      - name: Build DAppNode package
        run: npx @dappnode/dappnodesdk build --skip_upload

      # from_github pins the release assets as-is, so every file DAppNode needs to
      # install must be present: the manifest, the resolved compose (with image:
      # refs — not the build-based committed one), the avatar, and the image .txz.
      - name: Verify release files exist
        id: artifact
        run: |
          missing=0
          for f in dappnode_package.json docker-compose.yml avatar.png "$(basename "$xz")"; do
            if [ ! -f "${GITHUB_WORKSPACE}/${dir}/${f}" ]; then
              echo "::error::expected release file not found: ${dir}/${f}"
              missing=1
            fi
          done
          if [ "$missing" != 0 ]; then
            find . -path '*/build_*' -maxdepth 3 -type f
            exit 1
          fi
          echo "dir=${dir}" >> "$GITHUB_OUTPUT"
          echo "path=${xz}" >> "$GITHUB_OUTPUT"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dappnode-package-${{ github.ref_name }}
          path: ${{ steps.artifact.outputs.dir }}

      # Attach the four files individually (not the wrapping dir) so a from_github
      # pin reconstructs the exact directory DAppNode installs from.
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifact.outputs.dir }}/dappnode_package.json
            ${{ steps.artifact.outputs.dir }}/docker-compose.yml
            ${{ steps.artifact.outputs.dir }}/avatar.png
            ${{ steps.artifact.outputs.path }}
