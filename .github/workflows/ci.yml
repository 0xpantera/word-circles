name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Format check
        run: bun run fmt:check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge install foundry-rs/forge-std --no-git

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build

      - name: Test
        run: forge test
