name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Format check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: word_circles_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/word_circles_test
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Format check
        run: cargo fmt --check

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  # The committed OpenAPI snapshot (src/lib/api/openapi.json) is the FE/BE
  # contract; the frontend's TS types are generated from it. Regenerate it from
  # the backend and fail if it drifts, so a backend handler change can't ship a
  # frontend built against a stale contract. Mirrors `make openapi`.
  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Regenerate OpenAPI snapshot + TS types
        run: |
          cargo run --quiet --manifest-path backend/Cargo.toml --bin dump_openapi > src/lib/api/openapi.json
          bun run gen:api

      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- src/lib/api/openapi.json src/lib/api/types.ts; then
            echo "::error::OpenAPI snapshot/types are out of date. Run 'make openapi' and commit the result."
            exit 1
          fi

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: |
          forge install foundry-rs/forge-std --no-git
          forge install OpenZeppelin/openzeppelin-contracts --no-git

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build

      - name: Test
        run: forge test
