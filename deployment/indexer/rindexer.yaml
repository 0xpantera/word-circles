name: wc
description: Word Circles event indexer
project_type: no-code

networks:
  - name: gnosis
    chain_id: 100
    rpc: http://gnosis-erigon.dappnode:8545

storage:
  postgres:
    enabled: true

# Generated schemas + tables (rindexer convention: <project>_<contract>.<event_snake>):
#   wc_escrow.created / joined / resolved   (new escrow)
#   wc_stats.game_recorded                  (stats — unchanged)
# Internal state lives in the `rindexer_internal` schema.
contracts:
  - name: Escrow
    abi: ./abis/Escrow.json
    include_events:
      - Created
      - Joined
      - Resolved
    details:
      - network: gnosis
        address: "0x20a44c2C546FEBb4dcE773868B532D14663467A0"
        start_block: 46395258
  - name: Stats
    abi: ./abis/Stats.json
    include_events:
      - GameRecorded
    details:
      - network: gnosis
        address: "0xB96413584d7a4e07cc8c238cC4baA3474C956CCF"
        start_block: 46322128
