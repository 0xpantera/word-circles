version: "3.8"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: wordcircles
      POSTGRES_PASSWORD: wordcircles
      POSTGRES_DB: wordcircles
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordcircles"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://wordcircles:wordcircles@postgres:5432/wordcircles
      ARAK_DB_PATH: /data/arak.db
      RESOLVER_PRIVATE_KEY:
      RPC_URL: http://gnosis-erigon.dappnode:8545
      COMMITMENT_ADDRESS: "0x6e99c40bd8b87290EB977336c4Be8b2106baB08f"
      ESCROW_ADDRESS: "0x310bAdE38C51019093776bf1Ba51DA23583794c2"
      STATS_ADDRESS: "0xB96413584d7a4e07cc8c238cC4baA3474C956CCF"
      PVP_ENABLED: "false"
      PVP_TIMEOUT_SECS: "10800"
      DUNE_API_KEY:
      DUNE_QUERY_ID: "7572687"
    volumes:
      - data:/data
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      indexer:
        condition: service_started

  indexer:
    build:
      context: indexer
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["/usr/bin/tini", "--"]
    command: ["/opt/arak/arak"]
    working_dir: /data
    volumes:
      - data:/data

volumes:
  data: {}
  pgdata: {}
