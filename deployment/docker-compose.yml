# Docker Compose v2+ treats `version` as obsolete, but the dappnodesdk
# validator still requires it (otherwise: TypeError: Invalid Version: undefined.0).
version: "3.8"

services:
  postgres:
    build:
      context: db
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: wordcircles
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordcircles"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://wordcircles:wordcircles@postgres.word-circles.public.dappnode:5432/wordcircles
      RESOLVER_PRIVATE_KEY:
      RPC_URL: http://gnosis-erigon.dappnode:8545
      COMMITMENT_ADDRESS: "0x6e99c40bd8b87290EB977336c4Be8b2106baB08f"
      ESCROW_ADDRESS: "0x20a44c2C546FEBb4dcE773868B532D14663467A0"
      STATS_ADDRESS: "0xB96413584d7a4e07cc8c238cC4baA3474C956CCF"
      PVP_ENABLED: "false"
      PVP_TOKEN:
      PVP_AMOUNT: "1000000000000000000"
      PVP_CAPACITY: "2"
      PVP_TIMEOUT_SECS: "10800"
      BOT_ENABLED: "false"
      BOT_SAFE_ADDRESS:
      BOT_PRIVATE_KEY:
      BOT_JOIN_DELAY_SECS: "60"
      BOT_POLL_SECS: "15"
      DUNE_API_KEY:
      DUNE_QUERY_ID: "7572687"
      INDEXER_POLL_SECS: "5"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      indexer:
        condition: service_started

  indexer:
    build:
      context: indexer
      dockerfile: Dockerfile
    restart: unless-stopped
    # rindexer writes event tables directly into the shared Postgres — no
    # SQLite, no shared /data volume. Config + ABIs are baked into the image
    # at /etc/rindexer (set as WORKDIR in the Dockerfile). The image's
    # ENTRYPOINT is already `/app/rindexer`, so `command:` must only contain
    # arguments (not the binary path again).
    command: ["start", "indexer"]
    environment:
      DATABASE_URL: postgres://wordcircles:wordcircles@postgres.word-circles.public.dappnode:5432/wordcircles
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: {}
