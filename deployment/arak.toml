ethrpc = "http://gnosis-erigon.dappnode:8545"

[database.sqlite]
# Absolute path so arak.db lives in the /data volume regardless of arak's
# cwd (arak sets cwd to the directory of its config file, which is now /etc/arak).
connection = "file:/data/arak.db"

[indexer]
page-size = 1000
poll-interval = 5

[[event]]
name = "created"
start = 46395258
contract = "0x20a44c2C546FEBb4dcE773868B532D14663467A0"
signature = "event Created(bytes32 gameId, address player, address resolver, address token, uint256 amount, uint128 capacity)"

[[event]]
name = "joined"
start = 46395258
contract = "0x20a44c2C546FEBb4dcE773868B532D14663467A0"
signature = "event Joined(bytes32 gameId, address creator, address player, uint128 players)"

[[event]]
name = "resolved"
start = 46395258
contract = "0x20a44c2C546FEBb4dcE773868B532D14663467A0"
signature = "event Resolved(bytes32 gameId, address[] winners, uint256[] amounts)"

[[event]]
name = "game_recorded"
start = 46322128
contract = "0xB96413584d7a4e07cc8c238cC4baA3474C956CCF"
signature = "event GameRecorded(address indexed player, uint32 indexed gameId, bool won, uint8 guesses)"
