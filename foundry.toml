[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
optimizer = true
optimizer_runs = 200
# Allow the ZK verifier test to read its committed proof fixtures.
fs_permissions = [{ access = "read", path = "./test/zk/fixtures" }]

[fmt]
# WordleVerifier.sol is generated verbatim by `bb write_solidity_verifier`;
# keep it byte-identical to the tool output (don't reformat) so regeneration
# produces no churn.
ignore = ["contracts/zk/WordleVerifier.sol"]

[rpc_endpoints]
gnosis = "${RPC_URL}"

[etherscan]
gnosis = { key = "${GNOSISSCAN_API_KEY}", url = "https://api.gnosisscan.io/api", chain = 100 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
