[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]

[rpc_endpoints]
gnosis = "${RPC_URL}"

[etherscan]
gnosis = { key = "${GNOSISSCAN_API_KEY}", url = "https://api.gnosisscan.io/api", chain = 100 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
